services:
  account-service:
    image: eclipse-temurin:21-jre
    working_dir: /app
    volumes:
      - ./account-service/target/account-service.jar:/app/app.jar
    command: java -jar app.jar
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    image: eclipse-temurin:21-jre
    working_dir: /app
    volumes:
      - ./gateway/target/gateway.jar:/app/app.jar
    command: java -jar app.jar
    ports:
      - "8080:8080"
    environment:
      - ACCOUNT_SERVICE_BASE_URL=http://account-service:8081
    depends_on:
      account-service:
        condition: service_healthy
